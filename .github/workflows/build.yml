on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

name: Build

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - run: cargo build --all-features --all-targets
      - run: cargo test --all
      - run: cargo test --all-features --all-targets
      - run: cargo test --no-default-features
