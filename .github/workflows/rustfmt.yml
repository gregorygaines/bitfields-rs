on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

name: Rustfmt

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add --toolchain nightly-2026-02-27-x86_64-unknown-linux-gnu rustfmt
      - run: cargo fmt --all -- --check --verbose
